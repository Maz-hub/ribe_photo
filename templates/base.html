<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Links -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/fontawesome.css') }}"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/bootstrap.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='img/ribe_photo_favicon.png') }}"
    />

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-18YR2W6TZH"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-18YR2W6TZH");
    </script>

    <!--
      SEO block system — child templates override these three blocks:
        {% block title %}            → browser tab + og:title + twitter:title
        {% block meta_description %} → search snippet + og:description
        {% block og_image %}         → URL string only, drives og:image + twitter:image

      All three have sensible portfolio-wide defaults so pages that don't
      override them still produce valid meta tags.
    -->

    <!-- Page title — overridden per page via {% block title %} -->
    <title>{% block title %}Ribe Photo{% endblock %}</title>

    <!-- Meta description for search engines — keep under 160 chars -->
    <meta
      name="description"
      content="{% block meta_description %}Photography portfolio by Andrea Ribero — landscapes, nature and travel photography from Switzerland, Croatia, Greece and beyond.{% endblock %}"
    />

    <!--
      Open Graph — controls how links appear on Instagram, WhatsApp,
      LinkedIn, Facebook, Slack, iMessage, etc.
      og:title and og:description reuse the blocks above via self.block()
      so child templates only need to set things once.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ request.url }}" />
    <meta property="og:title" content="{{ self.title() }}" />
    <meta property="og:description" content="{{ self.meta_description() }}" />
    <!-- og:image value is the URL string provided by {% block og_image %} in each page -->
    <meta property="og:image" content="{% block og_image %}{% endblock %}" />

    <!-- Twitter / X card — summary_large_image shows the full banner on share -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="{{ self.og_image() }}" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark">
      <div class="container">
        <!-- Logo with Flask's `url_for` -->
        <a href="{{ url_for('index') }}" class="navbar-brand">
          <img
            src="{{ url_for('static', filename='img/ribe_photo-logo-W.png') }}"
            alt="Ribe Photo logo"
            width="55"
          />
        </a>

        <!-- Mobile Hamburger Menu -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavDropdown"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavDropdown">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a
                href="{{ url_for('galleries') }}"
                class="nav-link fw-semibold text-uppercase {% if request.endpoint == 'galleries' %}active{% endif %}"
              >
                Galleries
              </a>
            </li>
            <li class="nav-item">
              <a
                href="{{ url_for('about') }}"
                class="nav-link fw-semibold text-uppercase {% if request.endpoint == 'about' %}active{% endif %}"
              >
                About
              </a>
            </li>
            <li class="nav-item">
              <a
                href="{{ url_for('contact') }}"
                class="nav-link fw-semibold text-uppercase {% if request.endpoint == 'contact' %}active{% endif %}"
              >
                Contact
              </a>
            </li>
          </ul>
          <!-- Social Icons -->
          <!-- Instagram -->
          <span class="nav-item">
            <span class="fa-stack">
              <a
                href="https://www.instagram.com/ribe_photo/"
                target="_blank"
                rel="noopener noreferrer"
              >
                <i class="fas fa-circle fa-stack-2x"></i>
                <i class="fab fa-instagram fa-stack-1x text-white"></i>
              </a>
            </span>
          </span>
          <!-- Behance -->
          <span class="nav-item">
            <span class="fa-stack">
              <a
                href="https://www.behance.net/andrearibero"
                target="_blank"
                rel="noopener noreferrer"
              >
                <i class="fas fa-circle fa-stack-2x"></i>
                <i class="fab fa-behance fa-stack-1x text-white"></i>
              </a>
            </span>
          </span>
        </div>
      </div>
    </nav>

    <!-- <main> is the primary content landmark — used by screen readers,
         browser reader modes, and accessibility audit tools -->
    <main>
      {% block content %}{% endblock %}
    </main>
    <!-- Footer -->
    <footer class="text-white bg-dark py-3">
      <div class="container">
        <div class="row align-items-center">
          <!-- Privacy & Terms -->
          <div class="col-md-6 text-center text-md-start mb-2 mb-md-0">
            <a href="/privacy_terms" class="text-white text-decoration-none"
              >Privacy & Terms</a
            >
          </div>

          <!-- Copyright -->
          <div class="col-md-6 text-center text-md-end">
            <span>
              Copyright &copy; 2026 Ribe Photo | Developed by
              <a
                href="https://www.mazoolander.com/"
                class="text-white text-decoration-none"
              >
                Mazoolander
              </a>
            </span>
          </div>
        </div>
      </div>
    </footer>

    <!-- Back to the top button -->
    <button id="to-top" class="to-top-btn">
      <i class="fa-solid fa-arrow-up"></i>
    </button>

    <!-- JavaScript Links -->
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/masonry.pkgd.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
